services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: podo
      POSTGRES_PASSWORD: podo
      POSTGRES_DB: podo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podo -d podo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
