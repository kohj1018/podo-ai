services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: podo
      POSTGRES_PASSWORD: podo
      POSTGRES_DB: podo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podo -d podo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LocalStack — 로컬에서 AWS SQS 대역(ADR-106 A-INFRA). M6에서 실 AWS SQS로 엔드포인트만 교체.
  localstack:
    image: localstack/localstack:3
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
    volumes:
      - ./localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
