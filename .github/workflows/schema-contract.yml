name: schema-contract

# T-086 AC-3: test DB(GHA 서비스 컨테이너 postgres)에 migrate 후
# worker 의존 컬럼·타입 존재를 pytest로 검증(컬럼 drift 차단).
# pre-deploy gate로 deploy-api/deploy-worker의 gate job이 직접 실행하기도 함(T-084).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ai/**'
      - 'infra/**'
      - 'podo/**'
      - '.github/workflows/schema-contract.yml'

jobs:
  contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: podo
          POSTGRES_PASSWORD: podo
          POSTGRES_DB: podo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U podo -d podo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://podo:podo@localhost:5432/podo
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Run Prisma migrations (test DB)
        run: pnpm --filter @podo/api exec prisma migrate deploy
      - name: Run schema-contract tests
        run: uv run pytest ai/tests/test_schema_contract.py -v
