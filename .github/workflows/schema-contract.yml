name: schema-contract

# 폴리글랏 schema-contract 게이트 (ARCH §3-2 / F-006).
# 본 파일은 skeleton — 실측 assertion 은 T-021 이 test_schema_contract.py 를 채우며 활성화한다.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ai/**'
      - 'infra/**'
      - '.github/workflows/schema-contract.yml'

jobs:
  schema-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: podo
          POSTGRES_PASSWORD: podo
          POSTGRES_DB: podo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U podo -d podo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://podo:podo@localhost:5432/podo
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run schema-contract test (skeleton — T-021 fills real assertions)
        run: uv run pytest ai/tests/test_schema_contract.py
