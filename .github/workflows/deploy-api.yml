name: deploy-api

# T-084: api(NestJS) AWS ECS/Fargate 배포.
# pre-deploy gate = schema-contract(URL 불요). post-deploy smoke 검증은 T-086 소유.
# OIDC 권장 — AWS_ROLE_ARN GitHub Secret 필요(long-lived key 미사용).

on:
  push:
    branches: [main]

permissions:
  id-token: write   # OIDC AssumeRole
  contents: read

jobs:
  gate:
    name: schema-contract gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: podo
          POSTGRES_PASSWORD: podo
          POSTGRES_DB: podo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U podo -d podo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://podo:podo@localhost:5432/podo
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      # test DB 마이그레이션 — schema-contract pytest는 컬럼 존재를 검증하므로 빈 DB면 실패.
      - name: Run Prisma migrations (test DB)
        run: pnpm --filter @podo/api exec prisma migrate deploy
      - name: Run schema-contract (pre-deploy gate)
        run: uv run pytest ai/tests/test_schema_contract.py

  deploy:
    name: deploy api to ECS
    needs: [gate]
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build \
            -f podo/apps/api/Dockerfile \
            -t $ECR_REGISTRY/podo-api:$IMAGE_TAG \
            podo/apps/api
          docker push $ECR_REGISTRY/podo-api:$IMAGE_TAG

      # task-def-api.json = ECS task definition 베이스(컨테이너 정의·CPU/메모리·logConfiguration·
      # Secrets Manager valueFrom). 최초 배포 전 사용자/IaC가 생성하는 prerequisite — render는
      # image 태그만 주입(T-084 §9 "ECS 서비스 정의 존재 또는 생성", 사용자 수행).
      - name: Render new ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/aws/task-def-api.json
          container-name: podo-api
          image: ${{ env.ECR_REGISTRY }}/podo-api:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS
        id: ecs-deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_API }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deploy failed — rolling back to previous task definition revision"
          PREV_REVISION=$(aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE_API }} \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition' \
            --output text | sed 's/:[0-9]*$//')
          PREV_REVISION_NUM=$(aws ecs describe-task-definition \
            --task-definition "$PREV_REVISION" \
            --query 'taskDefinition.revision' \
            --output text)
          ROLLBACK_REVISION=$((PREV_REVISION_NUM - 1))
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE_API }} \
            --task-definition "${PREV_REVISION}:${ROLLBACK_REVISION}" \
            --no-cli-pager
          echo "Rolled back to ${PREV_REVISION}:${ROLLBACK_REVISION}"
