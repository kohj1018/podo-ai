name: deploy-api

# T-084: api(NestJS) AWS ECS/Fargate 배포.
# pre-deploy gate = schema-contract(URL 불요). post-deploy smoke 검증은 T-086 소유.
# OIDC 권장 — AWS_ROLE_ARN GitHub Secret 필요(long-lived key 미사용).

on:
  push:
    branches: [main]

permissions:
  id-token: write   # OIDC AssumeRole
  contents: read

jobs:
  gate:
    name: schema-contract gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: podo
          POSTGRES_PASSWORD: podo
          POSTGRES_DB: podo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U podo -d podo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://podo:podo@localhost:5432/podo
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      # test DB 마이그레이션 — schema-contract pytest는 컬럼 존재를 검증하므로 빈 DB면 실패.
      - name: Run Prisma migrations (test DB)
        run: pnpm --filter @podo/api exec prisma migrate deploy
      - name: Run schema-contract (pre-deploy gate)
        run: uv run pytest ai/tests/test_schema_contract.py

  deploy:
    name: deploy api to ECS
    needs: [gate]
    runs-on: ubuntu-latest
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 빌드 컨텍스트 = 리포 루트(.) — pnpm workspace lockfile 필요(Dockerfile은 podo/apps/api/Dockerfile).
      # 태스크 정의(Terraform 소유)가 :latest를 참조하므로 :latest + :<sha>(이력) 동시 태깅·push.
      - name: Build and push API image
        run: |
          docker build -f podo/apps/api/Dockerfile \
            -t "$ECR_REGISTRY/podo-api:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/podo-api:latest" .
          docker push "$ECR_REGISTRY/podo-api:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/podo-api:latest"

      # 서비스 강제 재배포 → 새 :latest 이미지를 pull(태스크 정의 Terraform 소유, 불변 → drift 없음).
      - name: Deploy to ECS (force new deployment)
        run: |
          aws ecs update-service --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVICE_API }}" --force-new-deployment --no-cli-pager
          aws ecs wait services-stable --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVICE_API }}"

      - name: Deploy failed notice
        if: failure()
        run: |
          echo "::error::api 배포 실패. 롤백: 직전 안정 커밋 SHA 이미지를 :latest로 재태깅·push 후 force-new-deployment."
