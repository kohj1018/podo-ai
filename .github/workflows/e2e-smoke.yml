name: e2e-smoke

# fresh-clone E2E 졸업 게이트 (graduation §5 #3 / M2 stabilize learning #2).
# 무키(OPENAI_API_KEY 미주입) — 커밋된 웜캐시(ai/worker/fixtures/llm_cache)로 외부 호출 0회.
# 웜캐시가 비어있으면 e2e.mjs가 명확한 에러로 실패한다(키 보유자가 `pnpm e2e:warm` 1회 후 커밋).

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ai/**'
      - 'crawler/**'
      - 'podo/**'
      - 'infra/**'
      - 'scripts/e2e.mjs'
      - '.github/workflows/e2e-smoke.yml'

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: podo
          POSTGRES_PASSWORD: podo
          POSTGRES_DB: podo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U podo -d podo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # LocalStack SQS — 멀티유저 큐 채점 경로(T-052, ADR-106 A-INFRA). 큐는 아래 step에서 생성
      # (GH service는 init 스크립트 미실행). M6에서 실 AWS SQS로 엔드포인트만 교체.
      localstack:
        image: localstack/localstack:3
        env:
          SERVICES: sqs
        ports:
          - 4566:4566
        options: >-
          --health-cmd "awslocal sqs list-queues || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://podo:podo@localhost:5432/podo
      E2E_SKIP_COMPOSE: '1'
      # SQS 엔드포인트·큐 URL(LocalStack). worker(boto3)/api(AWS SDK) 공통.
      SQS_ENDPOINT_URL: http://localhost:4566
      SQS_QUEUE_URL: http://localhost:4566/000000000000/scoring-queue
      SQS_STATUS_QUEUE_URL: http://localhost:4566/000000000000/scoring-status-queue
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      # 캐시 키 핀 — 커밋된 웜캐시(ai/worker/fixtures/llm_cache)를 생성한 값과 일치해야
      # cache hit. 재생성 시 이 3값 + 웜캐시를 함께 갱신(cache.py make_key 구성요소).
      OPENAI_MODEL: gpt-5.4-mini
      PROMPT_VERSION: v1
      SCHEMA_VERSION: v1
      # NOTE: OPENAI_API_KEY 의도적 미주입 — 무키 재현성을 게이트로 강제(웜캐시 경로).
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Create SQS queues (LocalStack service has no init hook)
        run: |
          aws --endpoint-url=http://localhost:4566 sqs create-queue --queue-name scoring-queue
          aws --endpoint-url=http://localhost:4566 sqs create-queue --queue-name scoring-status-queue
      - name: Run fresh-clone multiuser E2E (keyless — committed warm cache)
        run: node scripts/e2e.mjs --no-compose
